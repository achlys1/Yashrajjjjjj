<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Quote - Likhakriti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;500&display=swap');

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .quote-card {
    position: relative;
    max-width: 600px;
    padding: 40px;
    text-align: center;
    opacity: 0;
    /* The float animation moves the card up and down smoothly */
    animation: fadeIn 2s ease-out forwards, float 6s ease-in-out infinite;
  }

  .quote-mark {
    font-size: 80px;
    color: rgba(255, 215, 0, 0.15);
    position: absolute;
    top: -20px;
    left: 20px;
    font-family: 'Playfair Display', serif;
    animation: pulse 4s infinite alternate;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: #e0e0e0;
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 30px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    /* Golden gradient text effect */
    background: linear-gradient(45deg, #ffd700, #ffaa00, #ffd700, #ffaa00);
    -webkit-background-clip: text;
    background-clip: text;
    background-size: 200% auto;
    color: transparent;
    animation: shine 4s linear infinite;
  }

  .author {
    font-size: 1.2rem;
    color: #ffd700;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: slideUp 1.5s ease-out 1s forwards;
  }

  .brand {
    font-size: 0.9rem;
    color: #888;
    margin-top: 5px;
    letter-spacing: 3px;
    opacity: 0;
    animation: slideUp 1.5s ease-out 1.5s forwards;
  }

  /* Animation Keyframes */
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  @keyframes pulse {
    from { transform: scale(1); opacity: 0.1; }
    to { transform: scale(1.1); opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="quote-card">
  <div class="quote-mark">"</div>
  <div class="quote-text">
    I prioritize wisdom over ego to achieve success. I admire success rather than letting it foster ego, remaining grounded instead of feeling like I am on cloud nine.
  </div>
  <div class="author">— Yashraj Sharma</div>
  <div class="brand">Founder & CEO, Likhakriti</div>
</div>

</body>
</html>
